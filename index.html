<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.bundle.js"></script>
    <script>
        window.__uv$config = {
            prefix: '/service/',
            bare: 'https://uv.holyubofficial.net/bare/', 
            encodeUrl: Ultraviolet.codec.xor.encode,
            decodeUrl: Ultraviolet.codec.xor.decode,
            handler: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.handler.js',
            bundle: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.bundle.js',
            config: '/index.html',
            sw: '/sw.js',
        };
    </script>
</head>
<body style="background:#0b0b0b; color:#efefef; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0;">

    <div style="text-align:center; background:#161616; padding:50px; border-radius:20px; border:1px solid #222; box-shadow:0 20px 50px rgba(0,0,0,0.5);">
        <h1 style="margin-bottom:10px; font-weight:500;">FrotyProxy</h1>
        <p style="color:#666; margin-bottom:30px;">Cloud Workspace v1.0</p>
        
        <input type="text" id="url" placeholder="Search Google or enter URL" 
               style="width:300px; padding:15px; border-radius:10px; border:1px solid #333; background:#222; color:white; outline:none; margin-bottom:20px;">
        <br>
        <button onclick="launch()" 
                style="width:330px; padding:15px; border-radius:10px; border:none; background:#4f46e5; color:white; font-weight:bold; cursor:pointer; transition:0.2s;">
            Launch App
        </button>
        <p id="msg" style="margin-top:20px; font-size:12px; color:#444;"></p>
    </div>

    <script>
        async function launch() {
            const msg = document.getElementById('msg');
            let url = document.getElementById('url').value.trim();
            if (!url) return;

            if (!url.includes('.')) url = 'https://www.google.com/search?q=' + url;
            else if (!/^https?:\/\//.test(url)) url = 'http://' + url;

            msg.innerText = "Connecting to cloud...";
            
            try {
                // Register Service Worker
                await navigator.serviceWorker.register('./sw.js', {
                    scope: __uv$config.prefix
                });
                
                // Go!
                location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
            } catch (e) {
                msg.style.color = "#ff4444";
                msg.innerText = "Connection Error: Please allow cookies/service workers.";
            }
        }
    </script>
</body>
</html>
