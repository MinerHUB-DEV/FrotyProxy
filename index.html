<!DOCTYPE html>
<html>
<head>
    <title>Google Drive - Personal</title>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.bundle.js"></script>
    <script>
        // This script automatically fixes the "GitHub Path" problem
        const path = window.location.pathname.replace(/\/$/, "");
        
        window.__uv$config = {
            prefix: path + '/service/',
            bare: 'https://uv.holyubofficial.net/bare/', 
            encodeUrl: Ultraviolet.codec.xor.encode,
            decodeUrl: Ultraviolet.codec.xor.decode,
            handler: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.handler.js',
            bundle: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.bundle.js',
            config: path + '/index.html',
            sw: path + '/sw.js',
        };
    </script>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; text-align:center; padding-top:20vh; margin:0;">
    <div style="max-width:500px; margin:auto; background:#111; padding:40px; border-radius:20px; border:1px solid #333;">
        <h2 style="margin-top:0;">Search</h2>
        <input type="text" id="url" placeholder="https://google.com" style="width:80%; padding:15px; border-radius:10px; border:none; background:#222; color:white; margin-bottom:20px;">
        <br>
        <button onclick="launch()" style="width:85%; padding:15px; border-radius:10px; border:none; background:#4f46e5; color:white; cursor:pointer; font-weight:bold;">Launch Proxy</button>
        <p id="msg" style="margin-top:20px; font-size:12px; color:#555;"></p>
    </div>

    <script>
        async function launch() {
            const msg = document.getElementById('msg');
            let url = document.getElementById('url').value.trim();
            if (!url) return;
            
            if (!url.includes('.')) url = 'https://www.google.com/search?q=' + url;
            else if (!/^https?:\/\//.test(url)) url = 'http://' + url;

            msg.innerText = "Loading... please wait.";
            
            try {
                // Registering the worker
                await navigator.serviceWorker.register('./sw.js', {
                    scope: __uv$config.prefix
                });
                
                // Final launch
                location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
            } catch (e) {
                msg.style.color = "red";
                msg.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
