<!DOCTYPE html>
<html>
<head>
    <title>Google Drive - Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.bundle.js"></script>
    <script>
        window.__uv$config = {
            prefix: '/service/',
            bare: 'https://uv.holyubofficial.net/bare/', 
            encodeUrl: Ultraviolet.codec.xor.encode,
            decodeUrl: Ultraviolet.codec.xor.decode,
            handler: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.handler.js',
            bundle: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.6/dist/uv.bundle.js',
            config: '/index.html',
            sw: '/sw.js',
        };
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #uv-frame { border: none; width: 100%; height: 100%; display: none; }
        .main-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; }
        input { padding: 15px; width: 300px; border-radius: 8px; border: none; background: #222; color: white; margin-bottom: 10px; }
        button { padding: 15px 30px; border-radius: 8px; border: none; background: #4f46e5; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui" class="main-ui">
        <h1>FrotyProxy</h1>
        <input type="text" id="url" placeholder="Enter URL or Search...">
        <button onclick="launch()">Launch</button>
        <p id="status" style="color: #555; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <iframe id="uv-frame"></iframe>

    <script>
        async function launch() {
            const ui = document.getElementById('ui');
            const frame = document.getElementById('uv-frame');
            const status = document.getElementById('status');
            let url = document.getElementById('url').value.trim();

            if (!url) return;
            if (!url.includes('.')) url = 'https://www.google.com/search?q=' + url;
            else if (!/^https?:\/\//.test(url)) url = 'http://' + url;

            status.innerText = "Connecting...";

            try {
                await navigator.serviceWorker.register('./sw.js', { scope: __uv$config.prefix });
                
                // Instead of redirecting the whole page, we load the URL into the IFRAME
                frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
                
                // Hide the UI and show the frame
                ui.style.display = 'none';
                frame.style.display = 'block';
            } catch (e) {
                status.innerText = "Error: Use Incognito Mode.";
            }
        }
    </script>
</body>
</html>
